<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Kevin Dorée - Connexion</title>
    <link rel="stylesheet" href="Css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Epilogue:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Epilogue:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>

<main>
    <div class="row">
        <div class="col-1 split">
            <div class="start">
                <div class="logo-container">
                    <img src="assets/logo.png" alt="Logo" class="logo">
                    <div id="top-title">
                        <h1>La Kevin Dorée</h1>
                        <p>Where tradition rises with every golden crust</p>
                    </div>
                </div>
            </div>

            <div id="card"></div>
        </div>

        <div class="col-2">
            <div class="forms-wrapper">

                <form class="box active" id="signInForm">
                    <div class="row-start">
                        <p class="active" style="cursor: pointer;">Sign In</p>
                        <p id="switchToSignUp" style="cursor: pointer;">Sign Up</p>
                    </div>
                    <div class="line"></div>
                    <p class="welcome">Welcome Back</p>
                    <p class="context">Please enter your details to access your artisanal account.</p>

                    <p class="email">Email</p>
                    <input type="email" id="signInEmail" placeholder="Email" required>

                    <div class="split-password">
                        <p>Password</p>
                        <p>Forgot Password?</p>
                    </div>

                    <input type="password" id="signInPassword" placeholder="Mot de passe" required>

                    <div class="remember-container">
                        <input type="checkbox" id="remember-checkbox">
                        <label for="remember-checkbox" id="remember-me">Remember me for 30 days</label>
                    </div>

                    <button type="submit" class="sign-in-btn" style="width: 100%; border: none; cursor: pointer;">
                        Sign In
                    </button>
                </form>

                <form class="sign-up box" id="signUpForm">
                    <div class="row-start">
                        <p id="switchToSignIn" style="cursor: pointer;">Sign In</p>
                        <p class="active" style="cursor: pointer;">Sign Up</p>
                    </div>
                    <div class="line"></div>

                    <p class="welcome">Create your account</p>

                    <input type="email" id="signUpEmail" placeholder="Email" required>
                    <input type="text" id="signUpUsername" placeholder="Username" required>
                    <input type="password" id="signUpPassword" placeholder="Password" required>

                    <button type="submit" class="sign-in-btn" style="width: 100%; border: none; cursor: pointer;">
                        Register
                    </button>
                </form>

            </div>
        </div>
    </div>
</main>

<script src="Script/login.js"></script>

</body>
</html>
